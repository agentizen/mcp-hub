# mcp-hub runtime configuration.
#
# Structure:
#   subprocesses  — local MCP servers spawned lazily on first request.
#   remotes       — vendor-hosted MCP endpoints reached over HTTPS.
#   handles       — public routes exposed at /mcp/<handle>; each one
#                   references exactly one subprocess or remote, and may
#                   optionally filter the backend's tools via an
#                   allow-list.

subprocesses:
  # Microsoft 365 (Outlook, Calendar, OneDrive, SharePoint, Teams, Excel)
  #
  # softeria/ms-365-mcp-server validates every Authorization: Bearer
  # header against Microsoft Graph on each request, so the hub stays
  # pass-through and multi-tenant by design.
  - name: m365
    type: node
    port: 9000
    path: /mcp
    cwd: /opt/mcp-hub/node
    command:
      - node_modules/.bin/ms-365-mcp-server
      - --http
      - ":9000"
      - --org-mode

  # Google Workspace (Drive, Gmail, Calendar)
  #
  # taylorwilsdon/google_workspace_mcp with MCP_ENABLE_OAUTH21 +
  # WORKSPACE_MCP_STATELESS_MODE verifies the Bearer token on every
  # request via Google's userinfo endpoint. GOOGLE_OAUTH_CLIENT_ID /
  # GOOGLE_OAUTH_CLIENT_SECRET are inherited from the container env.
  - name: google-workspace
    type: python
    port: 9001
    path: /mcp
    cwd: /opt/mcp-hub/python/google_workspace_mcp
    command:
      - .venv/bin/python
      - main.py
      - --transport
      - streamable-http
      - --tools
      - gmail
      - drive
      - calendar
    env:
      WORKSPACE_MCP_PORT: "9001"
      MCP_ENABLE_OAUTH21: "true"
      WORKSPACE_MCP_STATELESS_MODE: "true"

remotes:
  - name: clickup
    url: https://mcp.clickup.com/mcp
  - name: hubspot
    url: https://mcp.hubspot.com
  - name: atlassian
    url: https://mcp.atlassian.com/v1/mcp
  - name: linear
    url: https://mcp.linear.app/mcp
  - name: notion
    url: https://mcp.notion.com/mcp
  - name: asana
    url: https://mcp.asana.com/v2/mcp
  - name: monday
    url: https://mcp.monday.com/mcp
  - name: context7
    url: https://mcp.context7.com
  - name: exa
    url: https://mcp.exa.ai

