version: 2

# Dependabot keeps the four ecosystems bundled in this repo up to date:
# Go dispatcher, vendored Node MCPs, GitHub Actions, and the Dockerfile
# base images.
#
# Python MCPs are NOT tracked here because they are cloned from their
# upstream git repository at image build time (see python/README.md).
# Bump `GWS_MCP_SHA` in the Dockerfile manually when a new upstream
# commit warrants a refresh.

updates:
  # ── Go dispatcher ──────────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /dispatcher
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    commit-message:
      prefix: "CORE/MINOR"
      include: scope
    groups:
      go-stdlib-adjacent:
        patterns:
          - "golang.org/x/*"
          - "gopkg.in/*"

  # ── Vendored Node MCPs ────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /node
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "CORE/MINOR"
      include: scope
    # MCP servers evolve fast — review every bump individually rather
    # than letting dependabot auto-group. ignore: [] keeps the default
    # "update everything" behavior without grouping.

  # ── GitHub Actions workflows ──────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "CORE/MINOR"
      include: scope

  # ── Dockerfile base images ────────────────────────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "CORE/MINOR"
      include: scope
